<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babi Agent</title>
    <!-- Markdown rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" id="hljs-light">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 30%, #a6c1ee 70%, #fbc2eb 100%); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.3s ease; }
        header { background: #1a1a2e; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; justify-content: center; }
        header .header-inner { max-width: 1100px; width: 100%; display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 18px; font-weight: 600; }
        header .badge { background: #00d2ff33; color: #00d2ff; font-size: 12px; padding: 2px 8px; border-radius: 10px; }
        .theme-toggle { background: none; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 4px 10px; font-size: 16px; cursor: pointer; color: #fff; transition: background 0.2s; }
        .theme-toggle:hover { background: rgba(255,255,255,0.15); }
        .github-link { margin-left: auto; display: flex; align-items: center; color: #fff; opacity: 0.8; transition: opacity 0.2s; }
        .github-link:hover { opacity: 1; }
        .github-link svg { width: 24px; height: 24px; fill: currentColor; }
        #chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; }
        #chat-inner { max-width: 1100px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
        .msg { padding: 12px 16px; border-radius: 12px; line-height: 1.7; font-size: 16px; word-break: break-word; }
        .msg.user { max-width: 75%; align-self: flex-end; background: rgba(26,115,232,0.75); backdrop-filter: blur(32px) saturate(1.5); -webkit-backdrop-filter: blur(32px) saturate(1.5); color: #fff; border-bottom-right-radius: 4px; white-space: pre-wrap; border: 1px solid rgba(255,255,255,0.35); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
        .msg.agent { width: 100%; align-self: flex-end; background: rgba(255,255,255,0.65); backdrop-filter: blur(32px) saturate(1.5); -webkit-backdrop-filter: blur(32px) saturate(1.5); color: #333; border-bottom-right-radius: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.7); }
        /* Markdown rendered content styles */
        .md-content h1, .md-content h2, .md-content h3, .md-content h4, .md-content h5, .md-content h6 { margin: 16px 0 8px; font-weight: 600; line-height: 1.4; }
        .md-content h1 { font-size: 1.5em; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .md-content h2 { font-size: 1.3em; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .md-content h3 { font-size: 1.15em; }
        .md-content p { margin: 8px 0; }
        .md-content ul, .md-content ol { padding-left: 1.8em; margin: 8px 0; }
        .md-content li { margin: 4px 0; }
        .md-content blockquote { border-left: 4px solid #ddd; padding: 4px 12px; margin: 8px 0; color: #666; background: #f9f9f9; border-radius: 0 4px 4px 0; }
        .md-content pre { background: #f6f8fa; border-radius: 6px; padding: 12px; overflow-x: auto; margin: 8px 0; font-size: 12px; line-height: 1.5; }
        .md-content code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 0.82em; }
        .md-content :not(pre) > code { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; }
        .md-content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
        .md-content th, .md-content td { border: 1px solid #ddd; padding: 6px 12px; text-align: left; }
        .md-content th { background: #f6f8fa; font-weight: 600; }
        .md-content a { color: #1a73e8; text-decoration: none; }
        .md-content a:hover { text-decoration: underline; }
        .md-content hr { border: none; border-top: 1px solid #e0e0e0; margin: 16px 0; }
        .md-content img { max-width: 100%; border-radius: 4px; cursor: zoom-in; transition: opacity 0.2s; }
        .md-content img:hover { opacity: 0.85; }
        /* Image lightbox */
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; cursor: zoom-out; justify-content: center; align-items: center; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 4px 32px rgba(0,0,0,0.5); }
        .msg .tool-event { background: #f0f4ff; border-left: 3px solid #1a73e8; padding: 6px 10px; margin: 6px 0; font-size: 13px; color: #555; border-radius: 4px; }
        .msg .tool-event.success { border-left-color: #34a853; }
        .msg .tool-event.error { border-left-color: #ea4335; }
        .msg .token-text { color: #333; }
        #input-area { padding: 16px 24px; background: transparent; border-top: none; display: flex; gap: 12px; align-items: flex-end; justify-content: center; }
        #input-area .input-inner { max-width: 1100px; width: 100%; position: relative; display: flex; align-items: flex-end; }
        #input-area textarea { flex: 1; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 12px 80px 12px 14px; font-size: 16px; font-family: inherit; resize: none; outline: none; min-height: 48px; max-height: 120px; line-height: 1.5; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); }
        #input-area textarea:focus { border-color: #1a73e8; }
        #input-area button { position: absolute; right: 6px; bottom: 6px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 14px; cursor: pointer; white-space: nowrap; height: 36px; }
        #input-area button:hover { background: #1557b0; }
        #input-area button:disabled { background: #ccc; cursor: not-allowed; }
        .session-bar { padding: 8px 24px; background: transparent; border-bottom: none; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; justify-content: center; }
        .session-bar .session-inner { max-width: 1100px; width: 100%; display: flex; align-items: center; gap: 8px; }
        .session-bar input { border: 1px solid #ddd; border-radius: 4px; padding: 4px 8px; font-size: 13px; width: 160px; outline: none; }
        .session-bar input:focus { border-color: #1a73e8; }
        .typing-indicator { display: inline-block; }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background: #999; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite both; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        /* Dark mode */
        html[data-theme="dark"] body { background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); }
        html[data-theme="dark"] header { background: #0d1117; border-bottom: 1px solid #21262d; }
        html[data-theme="dark"] .msg.agent { background: rgba(40,40,50,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: #e0e0e0; box-shadow: 0 2px 12px rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.08); }
        html[data-theme="dark"] .md-content h1, html[data-theme="dark"] .md-content h2 { border-bottom-color: #444; }
        html[data-theme="dark"] .md-content blockquote { border-left-color: #555; color: #aaa; background: rgba(42,42,42,0.8); }
        html[data-theme="dark"] .md-content pre { background: #161b22; }
        html[data-theme="dark"] .md-content :not(pre) > code { background: #3a3a3a; }
        html[data-theme="dark"] .md-content th { background: #2a2a2a; }
        html[data-theme="dark"] .md-content th, html[data-theme="dark"] .md-content td { border-color: #444; }
        html[data-theme="dark"] .md-content a { color: #58a6ff; }
        html[data-theme="dark"] .md-content hr { border-top-color: #444; }
        html[data-theme="dark"] .msg .tool-event { background: rgba(30,42,58,0.8); border-left-color: #58a6ff; color: #aaa; }
        html[data-theme="dark"] .msg .tool-event.success { border-left-color: #3fb950; }
        html[data-theme="dark"] .msg .tool-event.error { border-left-color: #f85149; }
        html[data-theme="dark"] .msg .token-text { color: #e0e0e0; }
        html[data-theme="dark"] #input-area { background: transparent; border-top: none; }
        html[data-theme="dark"] #input-area textarea { background: rgba(30,30,30,0.7); border-color: rgba(255,255,255,0.1); color: #e0e0e0; }
        html[data-theme="dark"] #input-area textarea:focus { border-color: #58a6ff; }
        html[data-theme="dark"] #input-area button { background: #1f6feb; }
        html[data-theme="dark"] #input-area button:hover { background: #388bfd; }
        html[data-theme="dark"] .session-bar { background: transparent; border-bottom: none; color: #aaa; }
        html[data-theme="dark"] .session-bar input { background: rgba(30,30,30,0.7); border-color: rgba(255,255,255,0.1); color: #e0e0e0; }
        html[data-theme="dark"] .session-bar input:focus { border-color: #58a6ff; }
        html[data-theme="dark"] .session-bar button { border-color: #444 !important; color: #aaa !important; }
        html[data-theme="dark"] .session-bar button:hover { border-color: #58a6ff !important; color: #e0e0e0 !important; }
        html[data-theme="dark"] .pinned-repos-header { color: #e0e0e0; }
        html[data-theme="dark"] .repo-card { background: rgba(45,45,45,0.85); border-color: #444; }
        html[data-theme="dark"] .repo-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.3); border-color: #58a6ff; }
        html[data-theme="dark"] .repo-card .repo-name a { color: #58a6ff; }
        html[data-theme="dark"] .repo-card .repo-desc { color: #8b949e; }
        html[data-theme="dark"] .typing-indicator span { background: #666; }
        /* Pinned repo cards */
        .pinned-repos-header { font-size: 1.2em; font-weight: 600; margin: 12px 0 16px; color: #1a1a2e; }
        .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin: 12px 0; }
        .repo-card { border: 1px solid #e1e4e8; border-radius: 8px; padding: 14px 16px; background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); transition: box-shadow 0.2s, border-color 0.2s; display: flex; flex-direction: column; }
        .repo-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-color: #1a73e8; }
        .repo-card .repo-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .repo-card .repo-name a { color: #1a73e8; text-decoration: none; }
        .repo-card .repo-name a:hover { text-decoration: underline; }
        .repo-card .repo-desc { font-size: 13px; color: #586069; margin-bottom: 10px; flex: 1; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .repo-card .repo-meta { font-size: 12px; color: #8b949e; display: flex; gap: 14px; align-items: center; }
        .repo-card .repo-meta .lang-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 3px; vertical-align: middle; }
        .repo-card .repo-meta span { display: flex; align-items: center; gap: 3px; }
        /* IDE Layout */
        .main-content { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 240px; min-width: 200px; background: #f8f9fa; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; transition: width 0.2s, min-width 0.2s, opacity 0.2s; overflow: hidden; }
        .sidebar.collapsed { width: 0; min-width: 0; opacity: 0; pointer-events: none; }
        .sidebar-header { padding: 10px 14px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #666; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; }
        .sidebar-header button { background: none; border: none; cursor: pointer; font-size: 14px; color: #666; padding: 2px 6px; border-radius: 4px; }
        .sidebar-header button:hover { background: rgba(0,0,0,0.06); }
        .file-tree { flex: 1; overflow-y: auto; padding: 6px 0; font-size: 13px; }
        .file-tree-item { padding: 4px 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #333; }
        .file-tree-item:hover { background: rgba(0,0,0,0.05); }
        .file-tree-item.active { background: rgba(26,115,232,0.12); color: #1a73e8; }
        .file-tree-item .icon { font-size: 14px; flex-shrink: 0; }
        .file-tree-item .name { overflow: hidden; text-overflow: ellipsis; }
        .file-tree-children { padding-left: 16px; }
        .file-tree-toggle { cursor: pointer; user-select: none; width: 16px; text-align: center; flex-shrink: 0; font-size: 10px; color: #888; }
        .content-area { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
        .file-preview { width: 0; min-width: 0; background: #fafbfc; border-left: 1px solid #e0e0e0; display: flex; flex-direction: column; overflow: hidden; transition: width 0.2s, min-width 0.2s; }
        .file-preview.open { width: 480px; min-width: 320px; }
        .file-preview-header { padding: 8px 14px; font-size: 12px; font-weight: 600; color: #666; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; background: #f6f8fa; }
        .file-preview-header .filename { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-preview-header button { background: none; border: none; cursor: pointer; font-size: 16px; color: #666; padding: 2px 8px; border-radius: 4px; }
        .file-preview-header button:hover { background: rgba(0,0,0,0.06); }
        .file-preview-content { flex: 1; overflow: auto; padding: 0; }
        .file-preview-content pre { margin: 0; padding: 12px 16px; font-size: 12px; line-height: 1.6; tab-size: 4; white-space: pre; width: max-content; min-width: 100%; }
        .file-preview-content code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
        .sidebar-toggle { position: fixed; left: 8px; bottom: 60px; z-index: 100; background: #1a73e8; color: #fff; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: none; align-items: center; justify-content: center; }
        .sidebar-toggle.visible { display: flex; }
        /* Dark mode - IDE layout */
        html[data-theme="dark"] .sidebar { background: #161b22; border-right-color: #30363d; }
        html[data-theme="dark"] .sidebar-header { color: #8b949e; border-bottom-color: #30363d; }
        html[data-theme="dark"] .sidebar-header button { color: #8b949e; }
        html[data-theme="dark"] .sidebar-header button:hover { background: rgba(255,255,255,0.06); }
        html[data-theme="dark"] .file-tree-item { color: #c9d1d9; }
        html[data-theme="dark"] .file-tree-item:hover { background: rgba(255,255,255,0.05); }
        html[data-theme="dark"] .file-tree-item.active { background: rgba(88,166,255,0.15); color: #58a6ff; }
        html[data-theme="dark"] .file-preview { background: #0d1117; border-left-color: #30363d; }
        html[data-theme="dark"] .file-preview-header { background: #161b22; color: #8b949e; border-bottom-color: #30363d; }
        html[data-theme="dark"] .file-preview-header button { color: #8b949e; }
        html[data-theme="dark"] .file-preview-header button:hover { background: rgba(255,255,255,0.06); }
        html[data-theme="dark"] .file-preview-content pre { background: #0d1117; }
        html[data-theme="dark"] .file-preview-content pre code.hljs { color: #c9d1d9; }
        .file-preview-content .image-preview { display: flex; align-items: center; justify-content: center; padding: 16px; }
        .file-preview-content .image-preview img { max-width: 100%; max-height: 80vh; border-radius: 8px; cursor: zoom-in; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
        html[data-theme="dark"] .sidebar-toggle { background: #1f6feb; }
    </style>
</head>
<body>
    <header><div class="header-inner">
        <h1>Babi Agent</h1>
        <span class="badge">AgentScope Java</span>
        <a class="github-link" href="https://github.com/javahongxi/babi" target="_blank" title="GitHub"><svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    </div></header>
    <div class="session-bar"><div class="session-inner">
        <label>Session:</label>
        <input type="text" id="session-id" value="default" placeholder="session id">
        <button onclick="clearChat()" style="background:none;border:1px solid #ddd;border-radius:4px;padding:4px 10px;font-size:13px;cursor:pointer;color:#666;">清空对话</button>
        <button onclick="clearMemory()" style="background:none;border:1px solid #ddd;border-radius:4px;padding:4px 10px;font-size:13px;cursor:pointer;color:#666;" title="清除工作区记忆（MEMORY.md）">清除记忆</button>
    </div></div>
    <div class="main-content">
        <div class="sidebar collapsed" id="sidebar">
            <div class="sidebar-header">
                <span>📁 工作区</span>
                <span style="display:flex;gap:4px;">
                    <button onclick="refreshTree()" title="刷新文件树">🔄</button>
                    <button onclick="toggleSidebar()" title="收起侧边栏">✕</button>
                </span>
            </div>
            <div class="file-tree" id="file-tree"></div>
        </div>
        <div class="content-area">
            <div id="chat-container"><div id="chat-inner"></div></div>
            <div id="input-area"><div class="input-inner">
                <textarea id="user-input" placeholder="输入消息，Enter 发送，Shift+Enter 换行..." rows="1"></textarea>
                <button id="send-btn" onclick="sendMessage()">发送</button>
            </div></div>
        </div>
        <div class="file-preview" id="file-preview">
            <div class="file-preview-header">
                <span class="filename" id="preview-filename"></span>
                <button onclick="closeFilePreview()" title="关闭预览">✕</button>
            </div>
            <div class="file-preview-content" id="file-preview-content">
                <pre><code id="preview-code"></code></pre>
            </div>
        </div>
    </div>
    <button class="sidebar-toggle visible" id="sidebar-toggle" onclick="toggleSidebar()" title="展开侧边栏">☰</button>

    <script>
        const chatInner = document.getElementById('chat-inner');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sessionIdInput = document.getElementById('session-id');
        // All stream state is local to sendMessage() — no globals needed
        let isSending = false; // Guard against EventSource auto-reconnect duplicates

        // Configure marked
        if (typeof marked !== 'undefined') {
            marked.setOptions({ breaks: true });
        } else {
            console.error('marked.js failed to load from CDN');
        }

        // Check highlight.js
        if (typeof hljs !== 'undefined') {
            console.log('highlight.js loaded, available languages:', hljs.listLanguages().length);
        } else {
            console.error('highlight.js failed to load');
        }

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Enter to send, Shift+Enter for newline
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function clearChat() {
            chatInner.innerHTML = '';
            const sessionId = sessionIdInput.value.trim() || 'default';
            // Delete session file on server
            fetch('/api/chat/session?sessionId=' + encodeURIComponent(sessionId), { method: 'DELETE' })
                .then(r => r.json())
                .then(data => console.log('Session deleted:', data.message))
                .catch(err => console.warn('Delete session failed:', err));
        }

        function clearMemory() {
            if (!confirm('确定要清除工作区记忆吗？这将删除 MEMORY.md，Agent 将不再记得之前的个人信息和上下文。')) return;
            const sessionId = sessionIdInput.value.trim() || 'default';
            fetch('/api/chat/memory?sessionId=' + encodeURIComponent(sessionId), { method: 'DELETE' })
                .then(r => r.json())
                .then(data => {
                    console.log('Memory cleared:', data.message);
                    alert(data.message);
                })
                .catch(err => console.warn('Clear memory failed:', err));
        }

        function renderMarkdown(el, text) {
            if (typeof marked !== 'undefined') {
                // Check if this contains pinned repos
                const reposData = parsePinnedRepos(text);
                if (reposData) {
                    el.innerHTML = renderPinnedReposCards(reposData);
                    return;
                }
                el.innerHTML = '<div class="md-content">' + marked.parse(text) + '</div>';
                // Auto-embed image URLs that are not already in <img> tags
                embedImageUrls(el);
                // Apply syntax highlighting to code blocks
                if (typeof hljs !== 'undefined') {
                    el.querySelectorAll('pre code').forEach(function(block) {
                        hljs.highlightElement(block);
                    });
                }
                // Bind lightbox click on images
                el.querySelectorAll('.md-content img').forEach(function(img) {
                    img.addEventListener('click', function() { openLightbox(this.src); });
                });
            } else {
                el.textContent = text;
            }
        }

        /**
         * Detects bare image URLs in text nodes and wraps them in <img> tags.
         * Matches http(s) URLs ending with image extensions that are NOT already inside <a> or <img>.
         */
        function embedImageUrls(el) {
            const imgExt = /\.(png|jpe?g|gif|webp|svg|bmp|ico)(\?[^\s]*)?$/i;
            const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            while (walker.nextNode()) textNodes.push(walker.currentNode);

            textNodes.forEach(function(node) {
                // Skip if parent is <a> or <img>
                if (node.parentElement && (node.parentElement.tagName === 'A' || node.parentElement.tagName === 'IMG')) return;
                const urlRegex = /(https?:\/\/[^\s<]+)/g;
                let match;
                let hasImage = false;
                while ((match = urlRegex.exec(node.textContent)) !== null) {
                    if (imgExt.test(match[1])) { hasImage = true; break; }
                }
                if (!hasImage) return;

                // Replace image URLs with <img> tags
                const frag = document.createDocumentFragment();
                let lastIdx = 0;
                urlRegex.lastIndex = 0;
                while ((match = urlRegex.exec(node.textContent)) !== null) {
                    const url = match[1];
                    if (!imgExt.test(url)) continue;
                    // Text before the URL
                    if (match.index > lastIdx) {
                        frag.appendChild(document.createTextNode(node.textContent.slice(lastIdx, match.index)));
                    }
                    const img = document.createElement('img');
                    img.src = url;
                    img.style.maxWidth = '100%';
                    img.style.borderRadius = '8px';
                    img.style.margin = '8px 0';
                    img.style.cursor = 'zoom-in';
                    img.addEventListener('click', function() { openLightbox(url); });
                    frag.appendChild(img);
                    lastIdx = match.index + url.length;
                }
                if (lastIdx < node.textContent.length) {
                    frag.appendChild(document.createTextNode(node.textContent.slice(lastIdx)));
                }
                node.parentNode.replaceChild(frag, node);
            });
        }

        // Lightbox for image preview
        function openLightbox(src) {
            let lb = document.getElementById('lightbox');
            if (!lb) {
                lb = document.createElement('div');
                lb.id = 'lightbox';
                lb.className = 'lightbox';
                lb.innerHTML = '<img src="" alt="preview">';
                lb.addEventListener('click', function() { lb.classList.remove('active'); });
                document.body.appendChild(lb);
            }
            lb.querySelector('img').src = src;
            lb.classList.add('active');
        }

        // Language colors
        const LANG_COLORS = {
            'Java': '#b07219', 'JavaScript': '#f1e05a', 'TypeScript': '#3178c6',
            'Python': '#3572A5', 'Go': '#00ADD8', 'Rust': '#dea584',
            'Ruby': '#701516', 'C++': '#f34b7d', 'C': '#555555',
            'Shell': '#89e051', 'HTML': '#e34c26', 'CSS': '#563d7c',
            'Kotlin': '#A97BFF', 'Scala': '#c22d40', 'PHP': '#4F5D95'
        };

        function parsePinnedRepos(text) {
            // Match pattern: ## 📌 @xxx 的置顶仓库
            const headerMatch = text.match(/##\s*📌\s*@(\S+)\s*的置顶仓库[^\n]*\n/);
            if (!headerMatch) return null;
            const username = headerMatch[1];
            const repos = [];
            // Parse each repo block: ### [name](url)\ndescription\n`Language: X` | ⭐ N | 🔀 N
            const repoRegex = /###\s*\[([^\]]+)\]\(([^)]+)\)\s*\n?([\s\S]*?)\n?`Language:\s*([^`]*)`\s*\|\s*⭐\s*(\d+)\s*\|\s*🔀\s*(\d+)/g;
            let m;
            while ((m = repoRegex.exec(text)) !== null) {
                repos.push({ name: m[1], url: m[2], desc: m[3].trim(), lang: m[4], stars: m[5], forks: m[6] });
            }
            if (repos.length === 0) return null;
            return { username: username, repos: repos };
        }

        function renderPinnedReposCards(data) {
            let html = '<div class="pinned-repos-header">📌 @' + data.username + ' 的置顶仓库 (' + data.repos.length + ' 个)</div>';
            html += '<div class="repo-grid">';
            data.repos.forEach(function(r) {
                const color = LANG_COLORS[r.lang] || '#8b949e';
                html += '<div class="repo-card">';
                html += '<div class="repo-name"><a href="' + r.url + '" target="_blank">' + r.name + '</a></div>';
                if (r.desc) html += '<div class="repo-desc">' + r.desc + '</div>';
                html += '<div class="repo-meta">';
                html += '<span><span class="lang-dot" style="background:' + color + '"></span>' + r.lang + '</span>';
                html += '<span>⭐ ' + r.stars + '</span>';
                html += '<span>🔀 ' + r.forks + '</span>';
                html += '</div></div>';
            });
            html += '</div>';
            return html;
        }

        // Scroll helper: wait for DOM to fully render, then scroll
        function scrollToBottom() {
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 20);
        }

        function makeScheduleRender(tokenElRef, textRef) {
            let timer = null;
            return function() {
                if (timer) return;
                timer = setTimeout(() => {
                    timer = null;
                    if (tokenElRef.el && textRef.text) {
                        renderMarkdown(tokenElRef.el, textRef.text);
                        scrollToBottom();
                    }
                }, 80);
            };
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            if (role === 'user') {
                div.textContent = text;
            } else {
                renderMarkdown(div, text);
            }
            chatInner.appendChild(div);
            scrollToBottom();
            return div;
        }

        function addToolEvent(agentMsg, tool, type, state, countRef) {
            const div = document.createElement('div');
            let cls = 'tool-event';
            let text = '';
            if (type === 'tool_call') {
                text = '🔧 调用工具: ' + tool;
            } else if (type === 'tool_result') {
                cls += state === 'SUCCESS' ? ' success' : ' error';
                text = (state === 'SUCCESS' ? '✅' : '❌') + ' ' + tool + ' → ' + state;
            }
            div.className = cls;
            div.textContent = text;
            agentMsg.appendChild(div);

            countRef.n++;
            // Only keep the latest 2 tool events visible
            if (countRef.n > 2) {
                const events = agentMsg.querySelectorAll('.tool-event');
                if (events.length > 2) {
                    events[0].remove();
                }
                if (!countRef.summaryEl) {
                    countRef.summaryEl = document.createElement('div');
                    countRef.summaryEl.className = 'tool-summary';
                    countRef.summaryEl.style.cssText = 'font-size:12px;color:#999;font-style:italic;padding:4px 10px;margin:4px 0;';
                    agentMsg.insertBefore(countRef.summaryEl, agentMsg.firstChild);
                }
                countRef.summaryEl.textContent = '⋯ 已调用 ' + countRef.n + ' 次工具（仅显示最近 2 次）';
            }

            scrollToBottom();
        }

        function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            if (isSending) return; // Prevent duplicate sends (EventSource auto-reconnect)
            isSending = true;

            const sessionId = sessionIdInput.value.trim() || 'default';
            addMessage('user', message);
            userInput.value = '';
            userInput.style.height = 'auto';

            // --- All stream state is LOCAL to this invocation ---
            const agentMsg = document.createElement('div');
            agentMsg.className = 'msg agent';
            chatInner.appendChild(agentMsg);

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            agentMsg.appendChild(indicator);
            scrollToBottom();

            sendBtn.disabled = true;

            let tokenEl = null;
            let rawText = '';
            const tokenElRef = { el: null };
            const textRef = { text: '' };
            const countRef = { n: 0, summaryEl: null };

            const scheduleRender = makeScheduleRender(tokenElRef, textRef);

            const url = '/api/chat/stream?message=' + encodeURIComponent(message) + '&sessionId=' + encodeURIComponent(sessionId);
            const eventSource = new EventSource(url);

            eventSource.addEventListener('token', function(e) {
                if (indicator.parentNode) indicator.remove();
                const data = JSON.parse(e.data);
                rawText += data.data;
                textRef.text = rawText;
                if (!tokenEl) {
                    tokenEl = document.createElement('div');
                    tokenEl.className = 'token-text';
                    agentMsg.appendChild(tokenEl);
                    tokenElRef.el = tokenEl;
                }
                scheduleRender();
            });

            eventSource.addEventListener('tool_call', function(e) {
                if (!e.data) return;
                const data = JSON.parse(e.data);
                if (!data) return;
                if (indicator.parentNode) indicator.remove();
                addToolEvent(agentMsg, data.tool || 'unknown', 'tool_call', null, countRef);
            });

            eventSource.addEventListener('tool_result', function(e) {
                if (!e.data) return;
                const data = JSON.parse(e.data);
                if (!data) return;
                addToolEvent(agentMsg, data.tool || 'unknown', 'tool_result', data.state, countRef);
            });

            eventSource.addEventListener('done', function() {
                if (indicator.parentNode) indicator.remove();
                if (tokenEl && rawText) {
                    renderMarkdown(tokenEl, rawText);
                }
                scrollToBottom();
                eventSource.close();
                isSending = false;
                sendBtn.disabled = false;
                userInput.focus();
            });

            eventSource.onerror = function() {
                // Always close immediately to prevent EventSource auto-reconnect
                eventSource.close();
                if (indicator.parentNode) indicator.remove();
                if (!rawText.trim()) {
                    agentMsg.textContent = '⚠️ 连接中断，请重试';
                } else if (tokenEl && rawText) {
                    renderMarkdown(tokenEl, rawText);
                }
                scrollToBottom();
                isSending = false;
                sendBtn.disabled = false;
                userInput.focus();
            };
        }

        // Theme management
        function applyTheme(theme, save) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';
            document.getElementById('hljs-light').disabled = (theme === 'dark');
            document.getElementById('hljs-dark').disabled = (theme === 'light');
            if (save) localStorage.setItem('babi-theme', theme);
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            applyTheme(current === 'dark' ? 'light' : 'dark', true);
        }
        // Init theme: localStorage > system preference > light
        (function() {
            const saved = localStorage.getItem('babi-theme');
            if (saved) { applyTheme(saved); }
            else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) { applyTheme('dark'); }
            else { applyTheme('light'); }
            // Listen for system theme changes
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    // Only auto-switch if user hasn't manually set a preference
                    if (!localStorage.getItem('babi-theme')) {
                        applyTheme(e.matches ? 'dark' : 'light');
                    }
                });
            }
        })();

        userInput.focus();

        // ========== File Tree & Preview ==========
        const fileTreeEl = document.getElementById('file-tree');
        const sidebarEl = document.getElementById('sidebar');
        const sidebarToggleEl = document.getElementById('sidebar-toggle');
        const filePreviewEl = document.getElementById('file-preview');
        const previewFilenameEl = document.getElementById('preview-filename');
        const previewCodeEl = document.getElementById('preview-code');
        let activeFileItem = null;

        const FILE_ICONS = {
            'java': '☕', 'js': '📜', 'ts': '📘', 'py': '🐍', 'go': '🔵',
            'html': '🌐', 'css': '🎨', 'json': '📋', 'xml': '📰', 'yaml': '⚙️',
            'yml': '⚙️', 'md': '📝', 'sh': '🖥️', 'sql': '🗃️', 'txt': '📄',
            'default': '📄'
        };

        function getFileIcon(name, isDir) {
            if (isDir) return '📁';
            const ext = name.split('.').pop().toLowerCase();
            return FILE_ICONS[ext] || FILE_ICONS['default'];
        }

        async function loadTree(path, parentEl) {
            try {
                const resp = await fetch('/api/workspace/tree?path=' + encodeURIComponent(path));
                const items = await resp.json();
                items.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'file-tree-item';
                    row.dataset.path = item.path;
                    row.dataset.isDir = item.isDir;

                    if (item.isDir) {
                        const toggle = document.createElement('span');
                        toggle.className = 'file-tree-toggle';
                        toggle.textContent = '▶';
                        row.appendChild(toggle);

                        const icon = document.createElement('span');
                        icon.className = 'icon';
                        icon.textContent = '📁';
                        row.appendChild(icon);

                        const name = document.createElement('span');
                        name.className = 'name';
                        name.textContent = item.name;
                        row.appendChild(name);

                        const children = document.createElement('div');
                        children.className = 'file-tree-children';
                        children.style.display = 'none';

                        row.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const isOpen = children.style.display !== 'none';
                            if (isOpen) {
                                children.style.display = 'none';
                                toggle.textContent = '▶';
                                icon.textContent = '📁';
                            } else {
                                if (children.children.length === 0) {
                                    await loadTree(item.path, children);
                                }
                                children.style.display = 'block';
                                toggle.textContent = '▼';
                                icon.textContent = '📂';
                            }
                        });

                        parentEl.appendChild(row);
                        parentEl.appendChild(children);
                    } else {
                        const icon = document.createElement('span');
                        icon.className = 'icon';
                        icon.textContent = getFileIcon(item.name, false);
                        row.appendChild(icon);

                        const name = document.createElement('span');
                        name.className = 'name';
                        name.textContent = item.name;
                        row.appendChild(name);

                        row.addEventListener('click', (e) => {
                            e.stopPropagation();
                            openFilePreview(item.path, item.name);
                            if (activeFileItem) activeFileItem.classList.remove('active');
                            row.classList.add('active');
                            activeFileItem = row;
                        });

                        parentEl.appendChild(row);
                    }
                });
            } catch (err) {
                console.error('Failed to load file tree:', err);
            }
        }

        async function openFilePreview(path, name) {
            previewFilenameEl.textContent = name;
            filePreviewEl.classList.add('open');

            const contentEl = document.getElementById('file-preview-content');
            const isImage = /\.(png|jpe?g|gif|webp|svg|bmp|ico)$/i.test(name);

            if (isImage) {
                // Image preview
                contentEl.innerHTML = '<div class="image-preview"><img src="/api/workspace/image?path=' + encodeURIComponent(path) + '" alt="' + name + '"></div>';
                contentEl.querySelector('img').addEventListener('click', function() {
                    openLightbox(this.src);
                });
                return;
            }

            // Code/text preview
            contentEl.innerHTML = '<pre><code id="preview-code"></code></pre>';
            const codeEl = document.getElementById('preview-code');
            codeEl.textContent = 'Loading...';
            codeEl.className = '';
            codeEl.removeAttribute('data-highlighted');

            try {
                const resp = await fetch('/api/workspace/file?path=' + encodeURIComponent(path));
                const data = await resp.json();
                if (data.error) {
                    codeEl.textContent = 'Error: ' + data.error;
                    return;
                }
                console.log('File preview:', name, 'language:', data.language, 'size:', data.size);
                if (data.language && data.language !== 'plaintext' && typeof hljs !== 'undefined') {
                    try {
                        const result = hljs.highlight(data.content, { language: data.language });
                        codeEl.innerHTML = result.value;
                        codeEl.className = 'hljs language-' + data.language;
                        console.log('Highlight applied successfully');
                    } catch (hljsErr) {
                        console.error('hljs.highlight error:', hljsErr);
                        codeEl.textContent = data.content;
                    }
                } else {
                    codeEl.textContent = data.content;
                    console.log('Skipping highlight: language=', data.language, 'hljs=', typeof hljs);
                }
            } catch (err) {
                codeEl.textContent = 'Failed to load file: ' + err.message;
            }
        }

        function closeFilePreview() {
            filePreviewEl.classList.remove('open');
            if (activeFileItem) {
                activeFileItem.classList.remove('active');
                activeFileItem = null;
            }
        }

        function toggleSidebar() {
            sidebarEl.classList.toggle('collapsed');
            const isCollapsed = sidebarEl.classList.contains('collapsed');
            sidebarToggleEl.classList.toggle('visible', isCollapsed);
            // Close file preview when collapsing sidebar
            if (isCollapsed) {
                closeFilePreview();
            }
        }

        function refreshTree() {
            fileTreeEl.innerHTML = '';
            loadTree('', fileTreeEl);
        }

        // Initialize file tree on load
        loadTree('', fileTreeEl);
    </script>
</body>
</html>
